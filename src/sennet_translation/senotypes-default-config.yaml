settings:
  index:
    mapping.total_fields.limit: 3500
    query.default_field: 2048

mappings:
  date_detection: False
  properties:
    senotype:
      properties:
        id:
          type: keyword
        doi:
          type: keyword
        name:
          type: text
          fields:
            keyword:
              type: keyword
        definition:
          type: text
        doc_sha256:
          type: text
        provenance:
          properties:
            successor:
              type: keyword
            predecessor:
              type: keyword
    submitter:
      properties:
        name:
          properties:
            first:
              type: text
              fields:
                keyword:
                  type: keyword
            last:
              type: text
              fields:
                keyword:
                  type: keyword
        email:
          type: keyword
    assertions:
      type: nested
      properties:
        predicate:
          properties:
            IRI:
              type: keyword
            term:
              type: keyword
        objects:
          type: nested
          properties:
            code:
              type: keyword
            term:
              type: text
              fields:
                keyword:
                  type: keyword
            source:
              type: keyword
            unit:
              type: keyword
            value:
              type: float
              ignore_malformed: true
            lowerbound:
              type: float
              ignore_malformed: true
            upperbound:
              type: float
              ignore_malformed: true
  dynamic_templates:
    - # Handle all numeric types as float to avoid cast errors
      map_every_numeric:
        match_mapping_type: long
        mapping:
          type: float
    # Must handle the above offending fields before this "catch all" mapping
    # This emulates the default ES behavior, giving us a "keyword" subfield, with a "keyword" type
    # Also copy the value of each mapped field to "all_text", which can then be queried as a single field
    - map_every_string:
        match_mapping_type: string
        mapping:
          type: text
          copy_to: all_text
          fields:
            keyword:
              type: keyword
